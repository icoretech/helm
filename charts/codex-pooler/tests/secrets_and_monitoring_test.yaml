suite: secrets and monitoring
templates:
  - secret.yaml
  - app-deployment.yaml
  - servicemonitor.yaml
tests:
  - it: accepts raw 32 byte upstream secret keys when creating the Secret
    template: secret.yaml
    set:
      secrets.create: true
      secrets.databaseUrl: postgres://example-postgres/codex_pooler
      secrets.secretKeyBase: example-secret-key-base
      secrets.totpEncryptionKey: example-totp-key
      secrets.upstreamSecretKey: rrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrr
    asserts:
      - equal:
          path: stringData["upstream-secret-key"]
          value: rrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrr

  - it: accepts base64 encoded 32 byte upstream secret keys when creating the Secret
    template: secret.yaml
    set:
      secrets.create: true
      secrets.databaseUrl: postgres://example-postgres/codex_pooler
      secrets.secretKeyBase: example-secret-key-base
      secrets.totpEncryptionKey: example-totp-key
      secrets.upstreamSecretKey: YmJiYmJiYmJiYmJiYmJiYmJiYmJiYmJiYmJiYmJiYmI=
    asserts:
      - equal:
          path: stringData["upstream-secret-key"]
          value: YmJiYmJiYmJiYmJiYmJiYmJiYmJiYmJiYmJiYmJiYmI=

  - it: rejects malformed chart-managed upstream secret keys
    template: secret.yaml
    set:
      secrets.create: true
      secrets.databaseUrl: postgres://example-postgres/codex_pooler
      secrets.secretKeyBase: example-secret-key-base
      secrets.totpEncryptionKey: example-totp-key
      secrets.upstreamSecretKey: not-base64
    asserts:
      - failedTemplate:
          errorMessage: "secrets.upstreamSecretKey (CODEX_POOLER_UPSTREAM_SECRET_KEY) must be 32 raw bytes or base64-encoded 32 bytes when secrets.create=true"

  - it: existing Secret deployments do not validate absent literal upstream secret keys
    template: app-deployment.yaml
    set:
      secrets.create: false
      secrets.existingSecret: codex-pooler-secrets
      secrets.upstreamSecretKey: not-base64
    asserts:
      - equal:
          path: spec.template.spec.containers[0].env[?(@.name=="CODEX_POOLER_UPSTREAM_SECRET_KEY")].valueFrom.secretKeyRef.key
          value: upstream-secret-key

  - it: renders ServiceMonitor without embedding metrics bearer token material
    template: servicemonitor.yaml
    set:
      monitoring.serviceMonitor.enabled: true
      monitoring.serviceMonitor.labels.release: kube-prometheus-stack
      monitoring.serviceMonitor.bearerTokenSecret.name: codex-pooler-metrics
      monitoring.serviceMonitor.bearerTokenSecret.key: token
    asserts:
      - isKind:
          of: ServiceMonitor
      - equal:
          path: metadata.labels.release
          value: kube-prometheus-stack
      - equal:
          path: spec.namespaceSelector.matchNames[0]
          value: NAMESPACE
      - equal:
          path: spec.endpoints[0].port
          value: http
      - equal:
          path: spec.endpoints[0].path
          value: /metrics
      - equal:
          path: spec.endpoints[0].interval
          value: 30s
      - equal:
          path: spec.endpoints[0].scrapeTimeout
          value: 10s
      - equal:
          path: spec.endpoints[0].bearerTokenSecret.name
          value: codex-pooler-metrics
      - equal:
          path: spec.endpoints[0].bearerTokenSecret.key
          value: token
