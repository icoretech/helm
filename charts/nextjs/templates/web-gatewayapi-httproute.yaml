{{- if .Values.web.httpRoute.enabled -}}
{{- if empty .Values.web.httpRoute.parentRefs -}}
{{- fail "nextjs: web.httpRoute.enabled requires web.httpRoute.parentRefs to be set" -}}
{{- end -}}
{{- $fullName := include "app.web.name" . -}}
{{- $svcPort := .Values.web.service.port -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $fullName }}
  labels:
    {{- include "app.labels" . | nindent 4 }}
  {{- with .Values.web.httpRoute.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  parentRefs:
    {{- toYaml .Values.web.httpRoute.parentRefs | nindent 4 }}
  {{- with .Values.web.httpRoute.hostnames }}
  hostnames:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    - matches:
        {{- toYaml .Values.web.httpRoute.matches | nindent 8 }}
      backendRefs:
        - name: {{ $fullName }}
          port: {{ $svcPort }}
{{- end }}
