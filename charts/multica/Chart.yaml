apiVersion: v2
name: multica
description: Multica managed agents platform for Kubernetes
type: application
version: 0.2.2
appVersion: "v0.2.19"
kubeVersion: ">= 1.24.0-0"
icon: https://raw.githubusercontent.com/multica-ai/multica/main/docs/assets/logo-light.svg
keywords:
  - multica
  - agents
  - codex
  - claude-code
  - ai
maintainers:
  - name: masterkain
    email: claudio@icorete.ch
    url: https://github.com/masterkain
home: https://github.com/multica-ai/multica
sources:
  - https://github.com/multica-ai/multica
  - https://github.com/icoretech/helm/tree/main/charts/multica
annotations:
  artifacthub.io/license: "Apache-2.0"
  artifacthub.io/signKey: |
    fingerprint: D089525241C856C7D4A34A41DB4CF65A75647D87
    url: https://icoretech.github.io/helm/pgp-public-key.asc
  artifacthub.io/images: |
    - name: multica-backend
      image: ghcr.io/multica-ai/multica-backend:v0.2.19
    - name: multica-web
      image: ghcr.io/multica-ai/multica-web:v0.2.19
dependencies:
  - name: postgres
    version: "0.19.3"
    repository: oci://registry-1.docker.io/cloudpirates
    condition: postgres.enabled
  - name: redis
    version: "0.27.4"
    repository: oci://registry-1.docker.io/cloudpirates
    condition: redis.enabled
