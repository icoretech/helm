backend:
  config:
    jwtSecretRef:
      name: multica-auth
      key: JWT_SECRET
    realtimeMetricsTokenRef:
      name: multica-auth
      key: REALTIME_METRICS_TOKEN
  email:
    resendApiKeyRef:
      name: multica-email
      key: RESEND_API_KEY
  google:
    clientIdRef:
      name: multica-google
      key: GOOGLE_CLIENT_ID
    clientSecretRef:
      name: multica-google
      key: GOOGLE_CLIENT_SECRET
storage:
  s3:
    bucket: multica-uploads
    accessKeyIdRef:
      name: multica-s3
      key: AWS_ACCESS_KEY_ID
    secretAccessKeyRef:
      name: multica-s3
      key: AWS_SECRET_ACCESS_KEY
    cloudfrontPrivateKeyRef:
      name: multica-s3
      key: CLOUDFRONT_PRIVATE_KEY
