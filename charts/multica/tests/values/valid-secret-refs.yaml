backend:
  config:
    jwtSecretRef:
      name: multica-auth
      key: JWT_SECRET
    realtimeMetricsTokenRef:
      name: multica-auth
      key: REALTIME_METRICS_TOKEN
  email:
    resendApiKeyRef:
      name: multica-email
      key: RESEND_API_KEY
    smtp:
      host: smtp.example.com
      port: 587
      usernameRef:
        name: multica-email
        key: SMTP_USERNAME
      passwordRef:
        name: multica-email
        key: SMTP_PASSWORD
      tlsInsecure: true
  google:
    clientIdRef:
      name: multica-google
      key: GOOGLE_CLIENT_ID
    clientSecretRef:
      name: multica-google
      key: GOOGLE_CLIENT_SECRET
  github:
    appSlug: multica-example-app
    webhookSecretRef:
      name: multica-github
      key: GITHUB_WEBHOOK_SECRET
    appId: "123456"
    appPrivateKeyRef:
      name: multica-github
      key: GITHUB_APP_PRIVATE_KEY
  lark:
    secretKeyRef:
      name: multica-lark
      key: MULTICA_LARK_SECRET_KEY
storage:
  s3:
    bucket: multica-uploads
    accessKeyIdRef:
      name: multica-s3
      key: AWS_ACCESS_KEY_ID
    secretAccessKeyRef:
      name: multica-s3
      key: AWS_SECRET_ACCESS_KEY
    cloudfrontPrivateKeyRef:
      name: multica-s3
      key: CLOUDFRONT_PRIVATE_KEY
