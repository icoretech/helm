suite: deployment rendering
templates:
  - backend-deployment.yaml
  - frontend-deployment.yaml
tests:
  - it: renders backend image from chart appVersion
    template: backend-deployment.yaml
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[0].image
          pattern: "^ghcr\\.io/multica-ai/multica-backend:v[0-9]+\\.[0-9]+\\.[0-9]+$"

  - it: renders frontend image from chart appVersion
    template: frontend-deployment.yaml
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[0].image
          pattern: "^ghcr\\.io/multica-ai/multica-web:v[0-9]+\\.[0-9]+\\.[0-9]+$"

  - it: wires backend health probes and local upload PVC
    template: backend-deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].startupProbe.httpGet.path
          value: /health
      - equal:
          path: spec.template.spec.containers[0].startupProbe.failureThreshold
          value: 30
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.path
          value: /health
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.path
          value: /readyz
      - equal:
          path: spec.template.spec.containers[0].volumeMounts[0].mountPath
          value: /app/data/uploads

  - it: rolls backend when referenced secret data changes
    template: backend-deployment.yaml
    values:
      - values/valid-secret-refs.yaml
    asserts:
      - matchRegex:
          path: spec.template.metadata.annotations["checksum/secret-refs"]
          pattern: "^[a-f0-9]{64}$"

  - it: omits empty volumeMounts when local uploads and extra mounts are disabled
    template: backend-deployment.yaml
    set:
      storage.local.persistence.enabled: false
    asserts:
      - notExists:
          path: spec.template.spec.containers[0].volumeMounts

  - it: sets privacy-preserving analytics defaults
    template: backend-deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].env[?(@.name=="ANALYTICS_DISABLED")].value
          value: "true"
      - equal:
          path: spec.template.spec.containers[0].env[?(@.name=="ANALYTICS_ENVIRONMENT")].value
          value: ""

  - it: supports analytics environment override
    template: backend-deployment.yaml
    set:
      backend.config.analyticsEnvironment: staging
    asserts:
      - equal:
          path: spec.template.spec.containers[0].env[?(@.name=="ANALYTICS_ENVIRONMENT")].value
          value: staging

  - it: supports disabling workspace creation
    template: backend-deployment.yaml
    set:
      backend.config.disableWorkspaceCreation: true
    asserts:
      - equal:
          path: spec.template.spec.containers[0].env[?(@.name=="DISABLE_WORKSPACE_CREATION")].value
          value: "true"

  - it: supports auth token TTL and trusted proxy overrides
    template: backend-deployment.yaml
    set:
      backend.config.authTokenTtl: 720h
      backend.config.trustedProxies: 10.0.0.0/8,127.0.0.1/32
    asserts:
      - equal:
          path: spec.template.spec.containers[0].env[?(@.name=="AUTH_TOKEN_TTL")].value
          value: 720h
      - equal:
          path: spec.template.spec.containers[0].env[?(@.name=="MULTICA_TRUSTED_PROXIES")].value
          value: 10.0.0.0/8,127.0.0.1/32

  - it: supports auth rate limit overrides
    template: backend-deployment.yaml
    set:
      backend.rateLimits.auth.maxPerMinute: 10
      backend.rateLimits.auth.verifyMaxPerMinute: 30
      backend.rateLimits.auth.trustedProxies: 127.0.0.1/32,::1/128
    asserts:
      - equal:
          path: spec.template.spec.containers[0].env[?(@.name=="RATE_LIMIT_AUTH")].value
          value: "10"
      - equal:
          path: spec.template.spec.containers[0].env[?(@.name=="RATE_LIMIT_AUTH_VERIFY")].value
          value: "30"
      - equal:
          path: spec.template.spec.containers[0].env[?(@.name=="RATE_LIMIT_TRUSTED_PROXIES")].value
          value: 127.0.0.1/32,::1/128

  - it: rejects managed DISABLE_WORKSPACE_CREATION overrides through extraEnv
    template: backend-deployment.yaml
    values:
      - values/invalid-managed-disable-workspace-creation-extraenv.yaml
    asserts:
      - failedTemplate:
          errorMessage: "multica: backend.extraEnv[0].name=DISABLE_WORKSPACE_CREATION is managed by the chart; use the dedicated value instead"

  - it: rejects managed auth token overrides through extraEnv
    template: backend-deployment.yaml
    values:
      - values/invalid-managed-auth-token-extraenv.yaml
    asserts:
      - failedTemplate:
          errorMessage: "multica: backend.extraEnv[0].name=AUTH_TOKEN_TTL is managed by the chart; use the dedicated value instead"

  - it: rejects managed rate limit overrides through extraEnv
    template: backend-deployment.yaml
    values:
      - values/invalid-managed-rate-limit-extraenv.yaml
    asserts:
      - failedTemplate:
          errorMessage: "multica: backend.extraEnv[0].name=RATE_LIMIT_AUTH is managed by the chart; use the dedicated value instead"

  - it: supports backend image tag override
    template: backend-deployment.yaml
    set:
      backend.image.tag: v9.9.9
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: ghcr.io/multica-ai/multica-backend:v9.9.9

  - it: supports frontend image tag override
    template: frontend-deployment.yaml
    set:
      frontend.image.tag: v9.9.9
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: ghcr.io/multica-ai/multica-web:v9.9.9

  - it: renders GitHub App env values from inline config
    template: backend-deployment.yaml
    set:
      backend.github.appSlug: multica-example-app
      backend.github.webhookSecret: webhook-secret
      backend.github.appId: "123456"
      backend.github.appPrivateKey: |
        -----BEGIN RSA PRIVATE KEY-----
        example
        -----END RSA PRIVATE KEY-----
    asserts:
      - equal:
          path: spec.template.spec.containers[0].env[?(@.name=="GITHUB_APP_SLUG")].value
          value: multica-example-app
      - equal:
          path: spec.template.spec.containers[0].env[?(@.name=="GITHUB_WEBHOOK_SECRET")].value
          value: webhook-secret
      - equal:
          path: spec.template.spec.containers[0].env[?(@.name=="GITHUB_APP_ID")].value
          value: "123456"
      - equal:
          path: spec.template.spec.containers[0].env[?(@.name=="GITHUB_APP_PRIVATE_KEY")].value
          value: |
            -----BEGIN RSA PRIVATE KEY-----
            example
            -----END RSA PRIVATE KEY-----
