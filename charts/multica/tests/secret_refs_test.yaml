suite: secret refs
templates:
  - backend-deployment.yaml
tests:
  - it: uses secret refs for sensitive backend settings
    values:
      - values/valid-secret-refs.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].env[?(@.name=="JWT_SECRET")].valueFrom.secretKeyRef.name
          value: multica-auth
      - equal:
          path: spec.template.spec.containers[0].env[?(@.name=="RESEND_API_KEY")].valueFrom.secretKeyRef.name
          value: multica-email
      - equal:
          path: spec.template.spec.containers[0].env[?(@.name=="GOOGLE_CLIENT_SECRET")].valueFrom.secretKeyRef.key
          value: GOOGLE_CLIENT_SECRET
      - equal:
          path: spec.template.spec.containers[0].env[?(@.name=="GITHUB_APP_PRIVATE_KEY")].valueFrom.secretKeyRef.name
          value: multica-github
      - equal:
          path: spec.template.spec.containers[0].env[?(@.name=="GITHUB_APP_PRIVATE_KEY")].valueFrom.secretKeyRef.key
          value: GITHUB_APP_PRIVATE_KEY
      - equal:
          path: spec.template.spec.containers[0].env[?(@.name=="AWS_SECRET_ACCESS_KEY")].valueFrom.secretKeyRef.name
          value: multica-s3

  - it: uses GitHub App secret refs when provided
    values:
      - values/valid-github-secret-ref.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].env[?(@.name=="GITHUB_APP_SLUG")].value
          value: multica-example-app
      - equal:
          path: spec.template.spec.containers[0].env[?(@.name=="GITHUB_WEBHOOK_SECRET")].valueFrom.secretKeyRef.name
          value: multica-github
      - equal:
          path: spec.template.spec.containers[0].env[?(@.name=="GITHUB_WEBHOOK_SECRET")].valueFrom.secretKeyRef.key
          value: GITHUB_WEBHOOK_SECRET
      - equal:
          path: spec.template.spec.containers[0].env[?(@.name=="GITHUB_APP_ID")].value
          value: "123456"
      - equal:
          path: spec.template.spec.containers[0].env[?(@.name=="GITHUB_APP_PRIVATE_KEY")].valueFrom.secretKeyRef.name
          value: multica-github
      - equal:
          path: spec.template.spec.containers[0].env[?(@.name=="GITHUB_APP_PRIVATE_KEY")].valueFrom.secretKeyRef.key
          value: GITHUB_APP_PRIVATE_KEY

  - it: rejects managed env overrides through extraEnv
    values:
      - values/invalid-managed-extraenv.yaml
    asserts:
      - failedTemplate:
          errorMessage: "multica: backend.extraEnv[0].name=DATABASE_URL is managed by the chart; use the dedicated value instead"

  - it: rejects managed GitHub App env overrides through extraEnv
    values:
      - values/invalid-managed-github-webhook-extraenv.yaml
    asserts:
      - failedTemplate:
          errorMessage: "multica: backend.extraEnv[0].name=GITHUB_WEBHOOK_SECRET is managed by the chart; use the dedicated value instead"

  - it: rejects managed GitHub App slug overrides through extraEnv
    values:
      - values/invalid-managed-github-appslug-extraenv.yaml
    asserts:
      - failedTemplate:
          errorMessage: "multica: backend.extraEnv[0].name=GITHUB_APP_SLUG is managed by the chart; use the dedicated value instead"
