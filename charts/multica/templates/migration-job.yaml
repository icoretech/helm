{{- include "multica.validate" . -}}
{{- if .Values.migrations.preUpgradeJob.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ printf "%s-migrations" (include "multica.backendServiceName" .) | trunc 63 | trimSuffix "-" }}
  labels:
    {{- include "multica.labels" . | nindent 4 }}
    app.kubernetes.io/component: migrations
  annotations:
    "helm.sh/hook": pre-upgrade
    "helm.sh/hook-weight": {{ printf "%v" .Values.migrations.preUpgradeJob.hookWeight | quote }}
    "helm.sh/hook-delete-policy": {{ .Values.migrations.preUpgradeJob.hookDeletePolicy | quote }}
spec:
  backoffLimit: {{ .Values.migrations.preUpgradeJob.backoffLimit }}
  {{- if .Values.migrations.preUpgradeJob.ttlSecondsAfterFinished }}
  ttlSecondsAfterFinished: {{ .Values.migrations.preUpgradeJob.ttlSecondsAfterFinished }}
  {{- end }}
  template:
    metadata:
      labels:
        {{- include "multica.componentSelectorLabels" (dict "root" . "component" "migrations") | nindent 8 }}
      {{- with .Values.migrations.preUpgradeJob.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      restartPolicy: Never
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "multica.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.backend.podSecurityContext | nindent 8 }}
      containers:
        - name: migrations
          securityContext:
            {{- toYaml .Values.backend.securityContext | nindent 12 }}
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          command:
            - /bin/sh
            - -ec
            - |
              if ./migrate up; then
                exit 0
              fi

              {{- if .Values.migrations.preUpgradeJob.backfillTaskUsageHourlyOnFailure }}
              echo "migrate up failed; running task usage hourly backfill before retrying"
              if [ ! -x ./backfill_task_usage_hourly ]; then
                echo "backfill_task_usage_hourly is not available in this backend image" >&2
                exit 1
              fi
              ./backfill_task_usage_hourly
              ./migrate up
              {{- else }}
              exit 1
              {{- end }}
          env:
            {{- if .Values.database.external.urlFrom.secretKeyRef.name }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.external.urlFrom.secretKeyRef.name | quote }}
                  key: {{ required "multica: database.external.urlFrom.secretKeyRef.key is required" .Values.database.external.urlFrom.secretKeyRef.key | quote }}
            {{- else }}
            - name: DATABASE_URL
              value: {{ include "multica.databaseUrl" . | trim | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.migrations.preUpgradeJob.resources | nindent 12 }}
{{- end }}
