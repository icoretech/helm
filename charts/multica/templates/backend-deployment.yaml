{{- include "multica.validate" . -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "multica.backendServiceName" . }}
  labels:
    {{- include "multica.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  {{- if not .Values.backend.autoscaling.enabled }}
  replicas: {{ .Values.backend.replicaCount }}
  {{- end }}
  progressDeadlineSeconds: {{ .Values.backend.deployment.progressDeadlineSeconds }}
  strategy:
    type: {{ .Values.backend.deployment.strategy.type }}
  selector:
    matchLabels:
      {{- include "multica.componentSelectorLabels" (dict "root" . "component" "backend") | nindent 6 }}
  template:
    metadata:
      {{- with .Values.backend.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "multica.componentSelectorLabels" (dict "root" . "component" "backend") | nindent 8 }}
        {{- with .Values.backend.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "multica.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.backend.podSecurityContext | nindent 8 }}
      {{- if .Values.database.waitForReady.enabled }}
      initContainers:
        - name: wait-for-postgres
          image: {{ .Values.database.waitForReady.image | quote }}
          imagePullPolicy: {{ .Values.database.waitForReady.imagePullPolicy }}
          command:
            - /bin/sh
            - -ec
            - |
              start_ts="$(date +%s)"
              while true; do
                if nc -z "${DB_HOST}" "${DB_PORT}"; then
                  echo "Database is reachable at ${DB_HOST}:${DB_PORT}"
                  exit 0
                fi
                now_ts="$(date +%s)"
                elapsed="$((now_ts - start_ts))"
                if [ "$elapsed" -ge "${WAIT_TIMEOUT}" ]; then
                  echo "Timed out waiting for database at ${DB_HOST}:${DB_PORT} after ${WAIT_TIMEOUT}s"
                  exit 1
                fi
                echo "Waiting for database at ${DB_HOST}:${DB_PORT} (${elapsed}s elapsed)"
                sleep "${WAIT_PERIOD}"
              done
          env:
            - name: DB_HOST
              value: {{ include "multica.databaseHost" . | trim | quote }}
            - name: DB_PORT
              value: {{ include "multica.databasePort" . | trim | quote }}
            - name: WAIT_TIMEOUT
              value: {{ printf "%v" .Values.database.waitForReady.timeoutSeconds | quote }}
            - name: WAIT_PERIOD
              value: {{ printf "%v" .Values.database.waitForReady.periodSeconds | quote }}
      {{- end }}
      containers:
        - name: backend
          securityContext:
            {{- toYaml .Values.backend.securityContext | nindent 12 }}
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          env:
            {{- $managed := dict }}
            - name: PORT
              value: {{ printf "%v" .Values.backend.config.port | quote }}
            {{- $_ := set $managed "PORT" true }}
            - name: APP_ENV
              value: {{ .Values.backend.config.appEnv | quote }}
            {{- $_ := set $managed "APP_ENV" true }}
            - name: FRONTEND_ORIGIN
              value: {{ .Values.backend.config.frontendOrigin | quote }}
            {{- $_ := set $managed "FRONTEND_ORIGIN" true }}
            - name: MULTICA_APP_URL
              value: {{ .Values.backend.config.frontendOrigin | quote }}
            {{- $_ := set $managed "MULTICA_APP_URL" true }}
            {{- if .Values.database.external.urlFrom.secretKeyRef.name }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.external.urlFrom.secretKeyRef.name | quote }}
                  key: {{ required "multica: database.external.urlFrom.secretKeyRef.key is required" .Values.database.external.urlFrom.secretKeyRef.key | quote }}
            {{- else }}
            - name: DATABASE_URL
              value: {{ include "multica.databaseUrl" . | trim | quote }}
            {{- end }}
            {{- $_ := set $managed "DATABASE_URL" true }}
            {{- if .Values.realtime.redisUrlRef.name }}
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.realtime.redisUrlRef.name | quote }}
                  key: {{ required "multica: realtime.redisUrlRef.key is required" .Values.realtime.redisUrlRef.key | quote }}
            {{- else if .Values.realtime.redisUrl }}
            - name: REDIS_URL
              value: {{ .Values.realtime.redisUrl | quote }}
            {{- else if .Values.redis.enabled }}
              {{- if .Values.redis.auth.enabled }}
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "multica.redis.fullname" . | quote }}
                  key: uri
              {{- else }}
            - name: REDIS_URL
              value: {{ include "multica.redis.unauthenticatedUrl" . | quote }}
              {{- end }}
            {{- end }}
            {{- $_ := set $managed "REDIS_URL" true }}
            {{- if .Values.backend.config.jwtSecretRef.name }}
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.backend.config.jwtSecretRef.name | quote }}
                  key: {{ required "multica: backend.config.jwtSecretRef.key is required" .Values.backend.config.jwtSecretRef.key | quote }}
            {{- else }}
            - name: JWT_SECRET
              value: {{ .Values.backend.config.jwtSecret | quote }}
            {{- end }}
            {{- $_ := set $managed "JWT_SECRET" true }}
            - name: CORS_ALLOWED_ORIGINS
              value: {{ .Values.backend.config.corsAllowedOrigins | quote }}
            {{- $_ := set $managed "CORS_ALLOWED_ORIGINS" true }}
            - name: ALLOWED_ORIGINS
              value: {{ .Values.backend.config.allowedOrigins | quote }}
            {{- $_ := set $managed "ALLOWED_ORIGINS" true }}
            - name: METRICS_ADDR
              value: {{ .Values.backend.config.metricsAddr | quote }}
            {{- $_ := set $managed "METRICS_ADDR" true }}
            {{- if .Values.backend.config.realtimeMetricsTokenRef.name }}
            - name: REALTIME_METRICS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.backend.config.realtimeMetricsTokenRef.name | quote }}
                  key: {{ required "multica: backend.config.realtimeMetricsTokenRef.key is required" .Values.backend.config.realtimeMetricsTokenRef.key | quote }}
            {{- else if .Values.backend.config.realtimeMetricsToken }}
            - name: REALTIME_METRICS_TOKEN
              value: {{ .Values.backend.config.realtimeMetricsToken | quote }}
            {{- end }}
            {{- $_ := set $managed "REALTIME_METRICS_TOKEN" true }}
            - name: MULTICA_DEV_VERIFICATION_CODE
              value: {{ .Values.backend.config.devVerificationCode | quote }}
            {{- $_ := set $managed "MULTICA_DEV_VERIFICATION_CODE" true }}
            - name: ALLOW_SIGNUP
              value: {{ printf "%v" .Values.backend.config.allowSignup | quote }}
            {{- $_ := set $managed "ALLOW_SIGNUP" true }}
            - name: ALLOWED_EMAILS
              value: {{ .Values.backend.config.allowedEmails | quote }}
            {{- $_ := set $managed "ALLOWED_EMAILS" true }}
            - name: ALLOWED_EMAIL_DOMAINS
              value: {{ .Values.backend.config.allowedEmailDomains | quote }}
            {{- $_ := set $managed "ALLOWED_EMAIL_DOMAINS" true }}
            - name: COOKIE_DOMAIN
              value: {{ .Values.backend.config.cookieDomain | quote }}
            {{- $_ := set $managed "COOKIE_DOMAIN" true }}
            - name: ANALYTICS_DISABLED
              value: {{ printf "%v" .Values.backend.config.analyticsDisabled | quote }}
            {{- $_ := set $managed "ANALYTICS_DISABLED" true }}
            - name: POSTHOG_API_KEY
              value: {{ .Values.backend.config.posthogApiKey | quote }}
            {{- $_ := set $managed "POSTHOG_API_KEY" true }}
            - name: POSTHOG_HOST
              value: {{ .Values.backend.config.posthogHost | quote }}
            {{- $_ := set $managed "POSTHOG_HOST" true }}
            {{- if .Values.backend.email.resendApiKeyRef.name }}
            - name: RESEND_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.backend.email.resendApiKeyRef.name | quote }}
                  key: {{ required "multica: backend.email.resendApiKeyRef.key is required" .Values.backend.email.resendApiKeyRef.key | quote }}
            {{- else }}
            - name: RESEND_API_KEY
              value: {{ .Values.backend.email.resendApiKey | quote }}
            {{- end }}
            {{- $_ := set $managed "RESEND_API_KEY" true }}
            - name: RESEND_FROM_EMAIL
              value: {{ .Values.backend.email.resendFromEmail | quote }}
            {{- $_ := set $managed "RESEND_FROM_EMAIL" true }}
            {{- if .Values.backend.google.clientIdRef.name }}
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.backend.google.clientIdRef.name | quote }}
                  key: {{ required "multica: backend.google.clientIdRef.key is required" .Values.backend.google.clientIdRef.key | quote }}
            {{- else }}
            - name: GOOGLE_CLIENT_ID
              value: {{ .Values.backend.google.clientId | quote }}
            {{- end }}
            {{- $_ := set $managed "GOOGLE_CLIENT_ID" true }}
            {{- if .Values.backend.google.clientSecretRef.name }}
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.backend.google.clientSecretRef.name | quote }}
                  key: {{ required "multica: backend.google.clientSecretRef.key is required" .Values.backend.google.clientSecretRef.key | quote }}
            {{- else }}
            - name: GOOGLE_CLIENT_SECRET
              value: {{ .Values.backend.google.clientSecret | quote }}
            {{- end }}
            {{- $_ := set $managed "GOOGLE_CLIENT_SECRET" true }}
            - name: GOOGLE_REDIRECT_URI
              value: {{ .Values.backend.google.redirectUri | quote }}
            {{- $_ := set $managed "GOOGLE_REDIRECT_URI" true }}
            - name: LOCAL_UPLOAD_DIR
              value: {{ .Values.storage.local.uploadDir | quote }}
            {{- $_ := set $managed "LOCAL_UPLOAD_DIR" true }}
            - name: LOCAL_UPLOAD_BASE_URL
              value: {{ .Values.storage.local.baseUrl | quote }}
            {{- $_ := set $managed "LOCAL_UPLOAD_BASE_URL" true }}
            - name: S3_BUCKET
              value: {{ .Values.storage.s3.bucket | quote }}
            {{- $_ := set $managed "S3_BUCKET" true }}
            - name: S3_REGION
              value: {{ .Values.storage.s3.region | quote }}
            {{- $_ := set $managed "S3_REGION" true }}
            - name: AWS_ENDPOINT_URL
              value: {{ .Values.storage.s3.endpointUrl | quote }}
            {{- $_ := set $managed "AWS_ENDPOINT_URL" true }}
            {{- if .Values.storage.s3.accessKeyIdRef.name }}
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.storage.s3.accessKeyIdRef.name | quote }}
                  key: {{ required "multica: storage.s3.accessKeyIdRef.key is required" .Values.storage.s3.accessKeyIdRef.key | quote }}
            {{- else if .Values.storage.s3.accessKeyId }}
            - name: AWS_ACCESS_KEY_ID
              value: {{ .Values.storage.s3.accessKeyId | quote }}
            {{- end }}
            {{- $_ := set $managed "AWS_ACCESS_KEY_ID" true }}
            {{- if .Values.storage.s3.secretAccessKeyRef.name }}
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.storage.s3.secretAccessKeyRef.name | quote }}
                  key: {{ required "multica: storage.s3.secretAccessKeyRef.key is required" .Values.storage.s3.secretAccessKeyRef.key | quote }}
            {{- else if .Values.storage.s3.secretAccessKey }}
            - name: AWS_SECRET_ACCESS_KEY
              value: {{ .Values.storage.s3.secretAccessKey | quote }}
            {{- end }}
            {{- $_ := set $managed "AWS_SECRET_ACCESS_KEY" true }}
            - name: CLOUDFRONT_DOMAIN
              value: {{ .Values.storage.s3.cloudfrontDomain | quote }}
            {{- $_ := set $managed "CLOUDFRONT_DOMAIN" true }}
            - name: CLOUDFRONT_KEY_PAIR_ID
              value: {{ .Values.storage.s3.cloudfrontKeyPairId | quote }}
            {{- $_ := set $managed "CLOUDFRONT_KEY_PAIR_ID" true }}
            {{- if .Values.storage.s3.cloudfrontPrivateKeyRef.name }}
            - name: CLOUDFRONT_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.storage.s3.cloudfrontPrivateKeyRef.name | quote }}
                  key: {{ required "multica: storage.s3.cloudfrontPrivateKeyRef.key is required" .Values.storage.s3.cloudfrontPrivateKeyRef.key | quote }}
            {{- else if .Values.storage.s3.cloudfrontPrivateKey }}
            - name: CLOUDFRONT_PRIVATE_KEY
              value: {{ .Values.storage.s3.cloudfrontPrivateKey | quote }}
            {{- end }}
            {{- $_ := set $managed "CLOUDFRONT_PRIVATE_KEY" true }}
            {{- if .Values.storage.s3.cloudfrontPrivateKeySecret }}
            - name: CLOUDFRONT_PRIVATE_KEY_SECRET
              value: {{ .Values.storage.s3.cloudfrontPrivateKeySecret | quote }}
            {{- end }}
            {{- $_ := set $managed "CLOUDFRONT_PRIVATE_KEY_SECRET" true }}
            {{- range $index, $env := .Values.backend.extraEnv }}
            {{- $name := default "" $env.name }}
            {{- if hasKey $managed $name }}
            {{- fail (printf "multica: backend.extraEnv[%d].name=%s is managed by the chart; use the dedicated value instead" $index $name) }}
            {{- end }}
            - name: {{ required (printf "multica: backend.extraEnv[%d].name is required" $index) $name | quote }}
              {{- if hasKey $env "value" }}
              value: {{ $env.value | quote }}
              {{- end }}
              {{- if hasKey $env "valueFrom" }}
              valueFrom:
                {{- toYaml $env.valueFrom | nindent 16 }}
              {{- end }}
            {{- end }}
          {{- with .Values.backend.envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.backend.service.targetPort }}
              protocol: TCP
          {{- with .Values.livenessProbe.backend }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe.backend }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
          volumeMounts:
            {{- if .Values.storage.local.persistence.enabled }}
            - name: uploads
              mountPath: {{ .Values.storage.local.uploadDir | quote }}
            {{- end }}
            {{- with .Values.backend.volumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
      {{- if or .Values.storage.local.persistence.enabled .Values.backend.volumes }}
      volumes:
        {{- if .Values.storage.local.persistence.enabled }}
        - name: uploads
          persistentVolumeClaim:
            claimName: {{ include "multica.uploadsClaimName" . }}
        {{- end }}
        {{- with .Values.backend.volumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
      {{- with .Values.backend.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.backend.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.backend.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
