apiVersion: v1
kind: Service
metadata:
  name: {{ include "multica.backendServiceName" . }}
  labels:
    {{- include "multica.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
  {{- with .Values.backend.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.backend.service.type }}
  ports:
    - port: {{ .Values.backend.service.port }}
      targetPort: http
      protocol: TCP
      name: http
      {{- with .Values.backend.service.nodePort }}
      nodePort: {{ . }}
      {{- end }}
  selector:
    {{- include "multica.componentSelectorLabels" (dict "root" . "component" "backend") | nindent 4 }}
