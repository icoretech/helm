{{- if .Values.tests.enabled }}
apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "multica.fullname" . }}-test-connection"
  labels:
    {{- include "multica.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  restartPolicy: Never
  containers:
    - name: wget
      image: "{{ .Values.tests.image.repository }}:{{ .Values.tests.image.tag }}"
      imagePullPolicy: {{ .Values.tests.image.pullPolicy }}
      command:
        - /bin/sh
        - -ec
        - wget -qO- "http://{{ include "multica.frontendServiceName" . }}:{{ .Values.frontend.service.port }}/" >/dev/null
{{- end }}
