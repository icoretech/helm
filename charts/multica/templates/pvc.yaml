{{- if and .Values.storage.local.persistence.enabled (not .Values.storage.local.persistence.existingClaim) }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "multica.uploadsClaimName" . }}
  labels:
    {{- include "multica.labels" . | nindent 4 }}
  {{- with .Values.storage.local.persistence.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  accessModes:
    {{- toYaml .Values.storage.local.persistence.accessModes | nindent 4 }}
  {{- with .Values.storage.local.persistence.storageClass }}
  storageClassName: {{ . | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.storage.local.persistence.size | quote }}
{{- end }}
