{{- include "multica.validate" . -}}
{{- if .Values.usageRollups.cronJob.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ printf "%s-usage-rollup" (include "multica.fullname" .) | trunc 63 | trimSuffix "-" }}
  labels:
    {{- include "multica.labels" . | nindent 4 }}
    app.kubernetes.io/component: usage-rollup
spec:
  schedule: {{ .Values.usageRollups.cronJob.schedule | quote }}
  concurrencyPolicy: {{ .Values.usageRollups.cronJob.concurrencyPolicy }}
  {{- if .Values.usageRollups.cronJob.startingDeadlineSeconds }}
  startingDeadlineSeconds: {{ .Values.usageRollups.cronJob.startingDeadlineSeconds }}
  {{- end }}
  successfulJobsHistoryLimit: {{ .Values.usageRollups.cronJob.successfulJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ .Values.usageRollups.cronJob.failedJobsHistoryLimit }}
  jobTemplate:
    spec:
      backoffLimit: {{ .Values.usageRollups.cronJob.backoffLimit }}
      template:
        metadata:
          labels:
            {{- include "multica.componentSelectorLabels" (dict "root" . "component" "usage-rollup") | nindent 12 }}
          {{- with .Values.usageRollups.cronJob.podAnnotations }}
          annotations:
            {{- toYaml . | nindent 12 }}
          {{- end }}
        spec:
          restartPolicy: Never
          {{- with .Values.imagePullSecrets }}
          imagePullSecrets:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          serviceAccountName: {{ include "multica.serviceAccountName" . }}
          containers:
            - name: usage-rollup
              image: "{{ .Values.usageRollups.cronJob.image.repository }}:{{ .Values.usageRollups.cronJob.image.tag }}"
              imagePullPolicy: {{ .Values.usageRollups.cronJob.image.pullPolicy }}
              command:
                - /bin/sh
                - -ec
                - |
                  deadline="$(( $(date +%s) + {{ .Values.database.waitForReady.timeoutSeconds }} ))"
                  while true; do
                    if psql "$DATABASE_URL" -Atqc "SELECT to_regprocedure('public.rollup_task_usage_hourly()') IS NOT NULL" 2>/tmp/rollup-ready.err | grep -qx t; then
                      break
                    fi
                    if [ "$(date +%s)" -ge "$deadline" ]; then
                      echo "Timed out waiting for rollup_task_usage_hourly() to become available" >&2
                      cat /tmp/rollup-ready.err >&2 || true
                      exit 1
                    fi
                    echo "Waiting for rollup_task_usage_hourly() to become available"
                    sleep {{ .Values.database.waitForReady.periodSeconds }}
                  done
                  psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -c 'SELECT public.rollup_task_usage_hourly();'
              env:
                {{- if .Values.database.external.urlFrom.secretKeyRef.name }}
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.database.external.urlFrom.secretKeyRef.name | quote }}
                      key: {{ required "multica: database.external.urlFrom.secretKeyRef.key is required" .Values.database.external.urlFrom.secretKeyRef.key | quote }}
                {{- else }}
                - name: DATABASE_URL
                  value: {{ include "multica.databaseUrl" . | trim | quote }}
                {{- end }}
              resources:
                {{- toYaml .Values.usageRollups.cronJob.resources | nindent 16 }}
{{- end }}
