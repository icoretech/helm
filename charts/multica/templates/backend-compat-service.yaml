{{- if .Values.frontend.backendServiceAlias.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.frontend.backendServiceAlias.name | quote }}
  labels:
    {{- include "multica.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: multica-web-compat
  {{- with .Values.frontend.backendServiceAlias.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "multica.componentSelectorLabels" (dict "root" . "component" "backend") | nindent 4 }}
{{- end }}
