{{- if .Values.backend.featureFlags.rules }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "multica.featureFlagsConfigMapName" . }}
  labels:
    {{- include "multica.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
data:
  feature-flags.yaml: |
    {{- toYaml .Values.backend.featureFlags.rules | nindent 4 }}
{{- end }}
