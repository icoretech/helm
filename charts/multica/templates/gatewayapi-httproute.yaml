{{- include "multica.validate" . -}}
{{- if .Values.httpRoute.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "multica.fullname" . }}
  labels:
    {{- include "multica.labels" . | nindent 4 }}
  {{- with .Values.httpRoute.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  parentRefs:
    {{- toYaml .Values.httpRoute.parentRefs | nindent 4 }}
  {{- with .Values.httpRoute.hostnames }}
  hostnames:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    {{- if .Values.httpRoute.backendMatches.enabled }}
    - matches:
        {{- toYaml .Values.httpRoute.backendMatches.matches | nindent 8 }}
      backendRefs:
        - name: {{ include "multica.backendServiceName" . }}
          port: {{ .Values.backend.service.port }}
    {{- end }}
    - matches:
        {{- toYaml .Values.httpRoute.matches | nindent 8 }}
      backendRefs:
        - name: {{ include "multica.frontendServiceName" . }}
          port: {{ .Values.frontend.service.port }}
{{- end }}
