{{- $extraEnvToken := dict "found" false "value" nil "valueFrom" nil -}}
{{- range .Values.extraEnv }}
  {{- if eq (default "" .name) "TOKEN" }}
    {{- $_ := set $extraEnvToken "found" true }}
    {{- if hasKey . "value" }}
      {{- $_ := set $extraEnvToken "value" .value }}
    {{- end }}
    {{- if hasKey . "valueFrom" }}
      {{- $_ := set $extraEnvToken "valueFrom" .valueFrom }}
    {{- end }}
  {{- end }}
{{- end }}
apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "browserless.fullname" . }}-test-connection"
  labels:
    {{- include "browserless.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: wget
      image: busybox
      command:
        - /bin/sh
        - -ec
      args:
        - wget -qO- "http://{{ include "browserless.fullname" . }}:{{ .Values.service.port }}/pressure?token=${TOKEN}" >/dev/null
      env:
        {{- if and (hasKey .Values.config "tokenSecretRef") .Values.config.tokenSecretRef }}
        - name: TOKEN
          valueFrom:
            secretKeyRef:
              name: {{ required "browserless: config.tokenSecretRef.name is required" .Values.config.tokenSecretRef.name | quote }}
              key: {{ required "browserless: config.tokenSecretRef.key is required" .Values.config.tokenSecretRef.key | quote }}
        {{- else if and (hasKey .Values.config "token") (ne (printf "%v" .Values.config.token) "") }}
        - name: TOKEN
          value: {{ printf "%v" .Values.config.token | quote }}
        {{- else if index $extraEnvToken "found" }}
        - name: TOKEN
          {{- with index $extraEnvToken "value" }}
          value: {{ . | quote }}
          {{- end }}
          {{- with index $extraEnvToken "valueFrom" }}
          valueFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
        {{- end }}
  restartPolicy: Never
