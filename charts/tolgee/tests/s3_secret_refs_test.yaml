suite: s3 secret key refs
templates:
  - deployment.yaml
tests:
  - it: reads s3 access and secret key from existing secret refs
    values:
      - values/valid-s3-secretrefs.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].env[?(@.name=="TOLGEE_FILE_STORAGE_S3_ACCESS_KEY")].valueFrom.secretKeyRef.name
          value: tolgee-s3
      - equal:
          path: spec.template.spec.containers[0].env[?(@.name=="TOLGEE_FILE_STORAGE_S3_ACCESS_KEY")].valueFrom.secretKeyRef.key
          value: access
      - equal:
          path: spec.template.spec.containers[0].env[?(@.name=="TOLGEE_FILE_STORAGE_S3_SECRET_KEY")].valueFrom.secretKeyRef.name
          value: tolgee-s3
      - equal:
          path: spec.template.spec.containers[0].env[?(@.name=="TOLGEE_FILE_STORAGE_S3_SECRET_KEY")].valueFrom.secretKeyRef.key
          value: secret
