suite: external database existing secret
templates:
  - deployment.yaml
tests:
  - it: uses existing secret refs for datasource env vars when provided
    values:
      - values/valid-external-secret.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].env[?(@.name=="SPRING_DATASOURCE_URL")].valueFrom.secretKeyRef.name
          value: tolgee-db
      - equal:
          path: spec.template.spec.containers[0].env[?(@.name=="SPRING_DATASOURCE_URL")].valueFrom.secretKeyRef.key
          value: jdbc_url
      - equal:
          path: spec.template.spec.containers[0].env[?(@.name=="SPRING_DATASOURCE_USERNAME")].valueFrom.secretKeyRef.key
          value: username
      - equal:
          path: spec.template.spec.containers[0].env[?(@.name=="SPRING_DATASOURCE_PASSWORD")].valueFrom.secretKeyRef.key
          value: password
      - notExists:
          path: spec.template.spec.initContainers
