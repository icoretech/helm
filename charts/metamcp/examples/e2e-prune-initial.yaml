auth:
  betterAuthSecret: dev-secret
env: {}
users:
  - email: admin@example.com
    name: Admin
    passwordFrom:
      secretKeyRef:
        name: metamcp-admin-credentials
        key: password
disablePublicSignup: true

provision:
  enabled: true
  runOnUpgrade: true
  updateExisting: true
  prune: true
  servers:
    - name: stdio-everything
      type: STDIO
      command: "npx"
      args: ["-y","@modelcontextprotocol/server-everything","stdio"]
    - name: legacy-stdio
      type: STDIO
      command: "npx"
      args: ["-y","@modelcontextprotocol/server-everything","stdio"]
  namespaces:
    - name: lab
      servers: ["stdio-everything"]
    - name: legacy
      servers: ["legacy-stdio"]
  endpoints:
    - name: lab
      namespace: lab
      enableApiKeyAuth: false
    - name: legacy
      namespace: legacy
      enableApiKeyAuth: false
