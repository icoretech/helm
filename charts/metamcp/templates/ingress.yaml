{{- if .Values.ingress.enabled -}}
{{- $fullName := include "metamcp.fullname" . -}}
{{- $svcPort := .Values.service.port -}}
{{- $ann := (default (dict) .Values.ingress.annotations) -}}
{{- $rewriteTrpc := true -}}
{{- if hasKey .Values.ingress "rewriteTrpcShortPath" -}}
{{- $rewriteTrpc = .Values.ingress.rewriteTrpcShortPath -}}
{{- end -}}
{{- $rewriteController := default "auto" .Values.ingress.rewriteTrpcShortPathController -}}
{{- $isNginx := or (eq $rewriteController "nginx") (and (eq $rewriteController "auto") (eq (default "" .Values.ingress.className) "nginx")) -}}
{{- $isTraefik := or (eq $rewriteController "traefik") (and (eq $rewriteController "auto") (eq (default "" .Values.ingress.className) "traefik")) -}}
{{- $traefikMiddlewareAPIAvailable := .Capabilities.APIVersions.Has "traefik.io/v1alpha1/Middleware" -}}
{{- $annotations := dict -}}
{{- range $key, $value := $ann -}}
{{- $_ := set $annotations $key $value -}}
{{- end -}}
{{- if and $isNginx $rewriteTrpc (not (hasKey $ann "nginx.ingress.kubernetes.io/configuration-snippet")) -}}
{{- $_ := set $annotations "nginx.ingress.kubernetes.io/configuration-snippet" (include "metamcp.nginxTrpcShortPathRewriteSnippet" .) -}}
{{- end -}}
{{- if and $isNginx $rewriteTrpc (not (hasKey $ann "nginx.ingress.kubernetes.io/use-regex")) -}}
{{- $_ := set $annotations "nginx.ingress.kubernetes.io/use-regex" "true" -}}
{{- end -}}
{{- if and $isTraefik $rewriteTrpc $traefikMiddlewareAPIAvailable -}}
{{- $middlewareKey := "traefik.ingress.kubernetes.io/router.middlewares" -}}
{{- $middlewareRef := include "metamcp.trpcShortPathMiddlewareRef" . -}}
{{- $existingMiddlewares := default "" (get $ann $middlewareKey) -}}
{{- if $existingMiddlewares -}}
{{- if not (contains $middlewareRef $existingMiddlewares) -}}
{{- $_ := set $annotations $middlewareKey (printf "%s,%s" $middlewareRef $existingMiddlewares) -}}
{{- end -}}
{{- else -}}
{{- $_ := set $annotations $middlewareKey $middlewareRef -}}
{{- end -}}
{{- end -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $fullName }}
  labels:
    {{- include "metamcp.labels" . | nindent 4 }}
  {{- if $annotations }}
  annotations:
    {{- toYaml $annotations | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ $fullName }}
                port:
                  number: {{ default $svcPort .port }}
          {{- end }}
          {{- if (default true $.Values.ingress.mapBackendPaths) }}
          # Map backend routes to port 12009 by default for out-of-the-box access
          - path: /metamcp/
            pathType: Prefix
            backend:
              service:
                name: {{ $fullName }}
                port:
                  number: 12009
          - path: /trpc/
            pathType: Prefix
            backend:
              service:
                name: {{ $fullName }}
                port:
                  number: 12009
          - path: /api/
            pathType: Prefix
            backend:
              service:
                name: {{ $fullName }}
                port:
                  number: 12009
          {{- /* Optional i18n locale prefixes (e.g., en) to route /en/{backend} to 12009 as well */}}
          {{- range $i, $lp := (default (list) $.Values.ingress.localePrefixes) }}
          - path: /{{ $lp }}/metamcp/
            pathType: Prefix
            backend:
              service:
                name: {{ $fullName }}
                port:
                  number: 12009
          - path: /{{ $lp }}/trpc/
            pathType: Prefix
            backend:
              service:
                name: {{ $fullName }}
                port:
                  number: 12009
          - path: /{{ $lp }}/api/
            pathType: Prefix
            backend:
              service:
                name: {{ $fullName }}
                port:
                  number: 12009
          {{- end }}
          {{- end }}
    {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- toYaml .Values.ingress.tls | nindent 4 }}
  {{- end }}
{{- end }}
