{{- if .Values.httpRoute.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "codex-lb.fullname" . }}
  labels:
    {{- include "codex-lb.labels" . | nindent 4 }}
  {{- with .Values.httpRoute.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  parentRefs:
    {{- toYaml .Values.httpRoute.parentRefs | nindent 4 }}
  {{- with .Values.httpRoute.hostnames }}
  hostnames:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    - matches:
        {{- toYaml .Values.httpRoute.matches | nindent 8 }}
      backendRefs:
        - name: {{ include "codex-lb.fullname" . }}
          port: {{ .Values.service.port }}
{{- end }}
---
{{- if and .Values.httpRoute.oauth.enabled .Values.service.oauth.enabled }}
{{- $oauthParentRefs := .Values.httpRoute.oauth.parentRefs | default .Values.httpRoute.parentRefs }}
{{- if not $oauthParentRefs }}
{{- fail "codex-lb: httpRoute.oauth.enabled requires either httpRoute.oauth.parentRefs or httpRoute.parentRefs to be set" }}
{{- end }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "codex-lb.fullname" . }}-oauth
  labels:
    {{- include "codex-lb.labels" . | nindent 4 }}
spec:
  parentRefs:
    {{- toYaml $oauthParentRefs | nindent 4 }}
  {{- $oauthHostnames := .Values.httpRoute.oauth.hostnames | default .Values.httpRoute.hostnames }}
  {{- with $oauthHostnames }}
  hostnames:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    - matches:
        {{- toYaml .Values.httpRoute.oauth.matches | nindent 8 }}
      backendRefs:
        - name: {{ include "codex-lb.fullname" . }}-oauth
          port: {{ .Values.service.oauth.port }}
{{- end }}
