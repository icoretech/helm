apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "codex-lb.fullname" . }}-test-connection"
  labels:
    {{- include "codex-lb.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: wget
      image: busybox
      command: ["wget"]
      args: ["--spider", "--timeout=5", '{{ include "codex-lb.fullname" . }}:{{ .Values.service.port }}/health']
  restartPolicy: Never
