{{- if and (eq .Values.topology.mode "standalone") .Values.persistence.enabled (not .Values.persistence.existingClaim) }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "codex-lb.persistence.claimName" . }}
  labels:
    {{- include "codex-lb.labels" . | nindent 4 }}
  {{- with .Values.persistence.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  accessModes:
    {{- toYaml .Values.persistence.accessModes | nindent 4 }}
  resources:
    requests:
      storage: {{ .Values.persistence.size }}
  {{- with .Values.persistence.storageClass }}
  storageClassName: {{ . | quote }}
  {{- end }}
  {{- with .Values.persistence.volumeMode }}
  volumeMode: {{ . | quote }}
  {{- end }}
{{- end }}
