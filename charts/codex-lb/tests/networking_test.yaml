suite: ingress and httproute templates
templates:
  - ingress.yaml
  - gatewayapi-httproute.yaml
tests:
  - it: renders ingress rules when enabled
    template: ingress.yaml
    values:
      - values/valid-ingress.yaml
    documentIndex: 0
    asserts:
      - equal:
          path: spec.ingressClassName
          value: nginx
      - equal:
          path: spec.rules[0].host
          value: codex-lb.example.com
      - equal:
          path: spec.rules[0].http.paths[0].backend.service.port.number
          value: 80

  - it: does not render ingress when disabled
    template: ingress.yaml
    values:
      - values/valid-minimal.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: renders oauth ingress when both service.oauth and ingress.oauth are enabled
    template: ingress.yaml
    values:
      - values/valid-oauth-ingress.yaml
    documentIndex: 1
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME-codex-lb-oauth
      - equal:
          path: spec.rules[0].http.paths[0].path
          value: /auth/callback
      - equal:
          path: spec.rules[0].http.paths[0].pathType
          value: Exact
      - equal:
          path: spec.rules[0].http.paths[0].backend.service.port.number
          value: 1455

  - it: renders continuity ingress in replicated mode
    template: ingress.yaml
    values:
      - values/valid-replicated-ingress.yaml
    documentIndex: 1
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME-codex-lb-responses
      - equal:
          path: metadata.annotations["nginx.ingress.kubernetes.io/upstream-hash-by"]
          value: $codex_lb_continuity_key
      - equal:
          path: spec.rules[0].http.paths[0].path
          value: /v1/responses
      - equal:
          path: spec.rules[0].http.paths[0].pathType
          value: Exact
      - equal:
          path: spec.rules[0].http.paths[1].path
          value: /backend-api/codex/responses

  - it: renders Gateway API HTTPRoute when enabled
    template: gatewayapi-httproute.yaml
    values:
      - values/valid-httproute.yaml
    documentIndex: 0
    asserts:
      - equal:
          path: spec.parentRefs[0].name
          value: shared-gateway
      - equal:
          path: spec.hostnames[0]
          value: codex-lb.example.com
      - equal:
          path: spec.rules[0].backendRefs[0].port
          value: 80

  - it: renders continuity HTTPRoute in replicated mode
    template: gatewayapi-httproute.yaml
    values:
      - values/valid-replicated-httproute.yaml
    documentIndex: 1
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME-codex-lb-responses
      - equal:
          path: spec.rules[0].matches[0].path.type
          value: Exact
      - equal:
          path: spec.rules[0].matches[0].path.value
          value: /v1/responses
      - equal:
          path: spec.rules[0].backendRefs[0].port
          value: 80

  - it: renders oauth HTTPRoute inheriting parentRefs from main httpRoute
    template: gatewayapi-httproute.yaml
    values:
      - values/valid-oauth-httproute.yaml
    documentIndex: 1
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME-codex-lb-oauth
      - equal:
          path: spec.parentRefs[0].name
          value: shared-gateway
      - equal:
          path: spec.rules[0].matches[0].path.value
          value: /auth/callback
      - equal:
          path: spec.rules[0].backendRefs[0].port
          value: 1455

  - it: does not render httproute when disabled
    template: gatewayapi-httproute.yaml
    values:
      - values/valid-minimal.yaml
    asserts:
      - hasDocuments:
          count: 0
