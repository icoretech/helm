name: metamcp e2e

on:
  pull_request:
    paths:
      - .github/workflows/metamcp-e2e.yaml
      - charts/metamcp/**
  push:
    branches: [ main ]
    paths:
      - .github/workflows/metamcp-e2e.yaml
      - charts/metamcp/**

concurrency:
  group: metamcp-e2e-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - name: Setup Helm
        uses: azure/setup-helm@v5.0.0
      - name: Setup kind
        uses: helm/kind-action@v1.14.0
        with:
          version: v0.24.0
          kubectl_version: v1.30.0
      - name: Run metamcp e2e
        env:
          # helm/kind-action sets context to "kind-chart-testing" by default
          KUBE_CONTEXT: kind-chart-testing
          TIMEOUT: 6m
          E2E_PF: "false"
        run: |
          chmod +x charts/metamcp/hack/e2e.sh
          charts/metamcp/hack/e2e.sh
